services:
  - type: web
    name: fuel-route-planner
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "./start.sh"
    plan: free

    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true          # Render auto-generates a secure value

      - key: DEBUG
        value: "False"

      # Force SQLite mode on Render single-service deploys.
      # This prevents stale dashboard values from older Postgres setups
      # from being used accidentally.
      - key: DATABASE_URL
        value: ""
      - key: DB_HOST
        value: ""

      - key: GRAPHHOPPER_API_KEY
        sync: false                  # You paste this manually in the Render dashboard

      - key: EIA_API_KEY
        sync: false                  # Optional: enables live weekly state average prices

      # RENDER_EXTERNAL_HOSTNAME is injected automatically by Render.
      # settings.py reads it and appends it to ALLOWED_HOSTS — no manual action needed.
