<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Fuel Route Planner</title>
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }
    h1 {
      margin-top: 0;
    }
    .card {
      background: #111827;
      border: 1px solid #1f2937;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
    }
    .grid {
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    }
    label {
      display: block;
      font-size: 13px;
      margin-bottom: 6px;
      color: #93c5fd;
    }
    input {
      width: 100%;
      box-sizing: border-box;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #334155;
      background: #0b1220;
      color: #e2e8f0;
    }
    .combo {
      position: relative;
    }
    .suggestions {
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      right: 0;
      max-height: 220px;
      overflow-y: auto;
      border: 1px solid #334155;
      border-radius: 8px;
      background: #0b1220;
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.35);
      z-index: 1200;
      display: none;
    }
    .suggestions.open {
      display: block;
    }
    .suggestion-item {
      padding: 10px;
      border-bottom: 1px solid #1e293b;
      cursor: pointer;
      font-size: 14px;
      color: #e2e8f0;
    }
    .suggestion-item:last-child {
      border-bottom: 0;
    }
    .suggestion-item:hover {
      background: #1e293b;
    }
    .suggestion-empty {
      padding: 10px;
      color: #94a3b8;
      font-size: 13px;
    }
    button {
      margin-top: 12px;
      padding: 10px 16px;
      border: 0;
      border-radius: 8px;
      background: #2563eb;
      color: white;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-secondary {
      background: #334155;
    }
    .btn-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    #map {
      height: 520px;
      border-radius: 12px;
      overflow: hidden;
    }
    .meta {
      font-size: 14px;
      color: #cbd5e1;
      margin: 6px 0;
    }
    .error {
      color: #fca5a5;
      white-space: pre-wrap;
      font-family: monospace;
      font-size: 13px;
    }
    .stop-list {
      margin: 0;
      padding-left: 18px;
    }
    .raw-output {
      background: #0b1220;
      border: 1px solid #1f2937;
      border-radius: 10px;
      padding: 12px;
      color: #94a3b8;
      font-size: 13px;
      line-height: 1.45;
      max-height: 380px;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-word;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    }
    .swagger-grid {
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    }
    .raw-block-title {
      margin: 0 0 8px 0;
      color: #93c5fd;
      font-size: 13px;
      font-weight: 600;
    }
    code {
      background: #0b1220;
      padding: 2px 6px;
      border-radius: 4px;
      color: #93c5fd;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Fuel Route Planner</h1>
    <p class="meta">CSV Endpoint: <code id="apiEndpointCsv"></code></p>
    <p class="meta">EIA Endpoint: <code id="apiEndpointEia"></code></p>

    <div class="card">
      <div class="grid">
        <div>
          <label for="start">Start location</label>
          <div class="combo">
            <input id="start" value="Denver, CO" autocomplete="off" />
            <div id="startSuggestions" class="suggestions"></div>
          </div>
        </div>
        <div>
          <label for="finish">Finish location</label>
          <div class="combo">
            <input id="finish" value="Phoenix, AZ" autocomplete="off" />
            <div id="finishSuggestions" class="suggestions"></div>
          </div>
        </div>
        <div>
          <label for="maxRange">Max range miles (optional)</label>
          <input id="maxRange" type="number" step="0.1" placeholder="500" />
        </div>
        <div>
          <label for="mpg">MPG (optional)</label>
          <input id="mpg" type="number" step="0.1" placeholder="10" />
        </div>
        <div>
          <label for="vehicleMpg">Vehicle MPG (optional override)</label>
          <input id="vehicleMpg" type="number" step="0.1" placeholder="9.2" />
        </div>
        <div>
          <label for="tankGallons">Tank gallons (optional)</label>
          <input id="tankGallons" type="number" step="0.1" placeholder="60" />
        </div>
      </div>
      <div class="btn-row">
        <button id="hitBtnCsv">Hit API (CSV Prices)</button>
        <button id="hitBtnEia" class="btn-secondary">Hit API (EIA Live)</button>
      </div>
      <p id="status" class="meta"></p>
      <p id="error" class="error"></p>
    </div>

    <div class="card">
      <h3>API Inspector</h3>
      <p class="meta">Swagger-style request/response view for the latest call.</p>
      <div class="btn-row" style="margin-top: 0;">
        <button id="importCurlBtn" class="btn-secondary">Import cURL (Prefilled)</button>
        <button id="copyResponseBtn" class="btn-secondary">Copy Response</button>
      </div>
      <div class="swagger-grid">
        <div>
          <p class="raw-block-title">Request</p>
          <pre id="rawRequest" class="raw-output">No request yet.</pre>
        </div>
        <div>
          <p class="raw-block-title">Response</p>
          <pre id="rawResponse" class="raw-output">No response yet.</pre>
        </div>
      </div>
    </div>

    <div class="card">
      <h3>Trip Summary</h3>
      <p id="summary" class="meta">No request yet.</p>
      <ol id="stops" class="stop-list"></ol>
    </div>

    <div class="card">
      <div id="map"></div>
    </div>

  </div>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  {{ location_suggestions|json_script:"locationSuggestionsData" }}
  <script>
    const locationSuggestions = JSON.parse(
      document.getElementById("locationSuggestionsData").textContent
    );

    const apiEndpointCsv = `${window.location.origin}/api/route/plan/`;
    const apiEndpointEia = `${window.location.origin}/api/route/plan/eia/`;
    let activeEndpoint = apiEndpointCsv;
    document.getElementById("apiEndpointCsv").textContent = apiEndpointCsv;
    document.getElementById("apiEndpointEia").textContent = apiEndpointEia;

    const map = L.map("map").setView([39.5, -98.35], 4);
    // Use Carto light tiles to avoid OSM volunteer tile-host referer blocking.
    L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png", {
      attribution:
        "&copy; OpenStreetMap contributors &copy; CARTO",
      subdomains: "abcd",
      maxZoom: 20,
    }).addTo(map);

    const layers = L.layerGroup().addTo(map);

    function setupThemedDropdown(inputId, suggestionsId) {
      const input = document.getElementById(inputId);
      const box = document.getElementById(suggestionsId);

      function filteredValues() {
        const q = input.value.trim().toLowerCase();
        const values = q
          ? locationSuggestions.filter((v) => v.toLowerCase().includes(q))
          : locationSuggestions;
        return values.slice(0, 20);
      }

      function renderList() {
        const values = filteredValues();
        box.innerHTML = "";
        if (!values.length) {
          const empty = document.createElement("div");
          empty.className = "suggestion-empty";
          empty.textContent = "No matching locations";
          box.appendChild(empty);
          return;
        }
        values.forEach((value) => {
          const item = document.createElement("div");
          item.className = "suggestion-item";
          item.textContent = value;
          item.addEventListener("mousedown", (ev) => {
            ev.preventDefault();
            input.value = value;
            box.classList.remove("open");
          });
          box.appendChild(item);
        });
      }

      input.addEventListener("focus", () => {
        renderList();
        box.classList.add("open");
      });
      input.addEventListener("input", () => {
        renderList();
        box.classList.add("open");
      });
      input.addEventListener("blur", () => {
        setTimeout(() => box.classList.remove("open"), 120);
      });
    }

    function parseOptionalNumber(value) {
      if (!value || String(value).trim() === "") return null;
      const num = Number(value);
      return Number.isFinite(num) ? num : null;
    }

    function buildPayload() {
      const payload = {
        start: document.getElementById("start").value.trim(),
        finish: document.getElementById("finish").value.trim(),
      };

      const maxRange = parseOptionalNumber(document.getElementById("maxRange").value);
      const mpg = parseOptionalNumber(document.getElementById("mpg").value);
      const vehicleMpg = parseOptionalNumber(document.getElementById("vehicleMpg").value);
      const tankGallons = parseOptionalNumber(document.getElementById("tankGallons").value);

      if (maxRange !== null) payload.max_range_miles = maxRange;
      if (mpg !== null) payload.mpg = mpg;

      const vehicle = {};
      if (vehicleMpg !== null) vehicle.mpg = vehicleMpg;
      if (tankGallons !== null) vehicle.tank_gallons = tankGallons;
      if (Object.keys(vehicle).length > 0) payload.vehicle = vehicle;

      return payload;
    }

    function renderStops(stops) {
      const list = document.getElementById("stops");
      list.innerHTML = "";
      stops.forEach((stop, idx) => {
        const li = document.createElement("li");
        li.textContent =
          `Fuel ${idx + 1}: ${stop.station_name} | ${stop.mile_marker} mi | ` +
          `${stop.gallons_purchased} gal | $${stop.cost}`;
        list.appendChild(li);
      });
    }

    function renderMap(data) {
      layers.clearLayers();
      const geojsonLayer = L.geoJSON(data.map_data, {
        style: (feature) => {
          if (feature.properties.type === "route") {
            return { color: "#22c55e", weight: 5 };
          }
          return {};
        },
        pointToLayer: (feature, latlng) => {
          let label = feature.properties.label || feature.properties.type;
          if (feature.properties.type === "fuel_stop") {
            const idx = data.fuel_stops.findIndex(
              (s) => s.station_id === feature.properties.station_id
            );
            if (idx >= 0) {
              label = `Fuel ${idx + 1} - ${label}`;
            }
            return L.circleMarker(latlng, {
              radius: 8,
              color: "#dc2626",
              fillColor: "#ef4444",
              fillOpacity: 0.95,
              weight: 2,
            }).bindPopup(label);
          }

          if (feature.properties.type === "start") {
            return L.circleMarker(latlng, {
              radius: 8,
              color: "#065f46",
              fillColor: "#10b981",
              fillOpacity: 0.95,
              weight: 2,
            }).bindPopup(label);
          }

          if (feature.properties.type === "finish") {
            return L.circleMarker(latlng, {
              radius: 8,
              color: "#1e3a8a",
              fillColor: "#3b82f6",
              fillOpacity: 0.95,
              weight: 2,
            }).bindPopup(label);
          }

          return L.marker(latlng).bindPopup(label);
        },
      });
      geojsonLayer.addTo(layers);
      map.fitBounds(geojsonLayer.getBounds(), { padding: [30, 30] });
    }

    async function hitApi(endpointMode) {
      const btnCsv = document.getElementById("hitBtnCsv");
      const btnEia = document.getElementById("hitBtnEia");
      const status = document.getElementById("status");
      const error = document.getElementById("error");
      const summary = document.getElementById("summary");
      const rawRequest = document.getElementById("rawRequest");
      const rawResponse = document.getElementById("rawResponse");

      activeEndpoint = endpointMode === "eia" ? apiEndpointEia : apiEndpointCsv;
      error.textContent = "";
      btnCsv.disabled = true;
      btnEia.disabled = true;
      status.textContent = `Calling ${endpointMode.toUpperCase()} endpoint...`;

      try {
        const payload = buildPayload();
        const requestHeaders = { "Content-Type": "application/json" };
        rawRequest.textContent = JSON.stringify(
          {
            method: "POST",
            url: activeEndpoint,
            headers: requestHeaders,
            body: payload,
          },
          null,
          2
        );

        const res = await fetch(activeEndpoint, {
          method: "POST",
          headers: requestHeaders,
          body: JSON.stringify(payload),
        });
        const data = await res.json();
        const responseHeaders = {};
        res.headers.forEach((value, key) => {
          responseHeaders[key] = value;
        });
        rawResponse.textContent = JSON.stringify(
          {
            status: res.status,
            ok: res.ok,
            headers: responseHeaders,
            body: data,
          },
          null,
          2
        );

        if (!res.ok) {
          throw new Error(JSON.stringify(data, null, 2));
        }

        summary.textContent =
          `Engine: ${data.route.engine} | Distance: ${data.route.distance_miles} mi | ` +
          `Duration: ${data.route.duration_minutes} min | Total fuel: $${data.total_fuel_cost}`;

        renderStops(data.fuel_stops || []);
        renderMap(data);
        status.textContent = "Success.";
      } catch (err) {
        status.textContent = "Failed.";
        error.textContent = err.message || String(err);
        rawResponse.textContent = JSON.stringify(
          {
            status: "request_failed",
            error: err.message || String(err),
          },
          null,
          2
        );
      } finally {
        btnCsv.disabled = false;
        btnEia.disabled = false;
      }
    }

    function currentPayloadForCurl() {
      return buildPayload();
    }

    function buildCurlSnippet() {
      const payload = currentPayloadForCurl();
      const escapedBody = JSON.stringify(payload).replace(/'/g, "'\"'\"'");
      return (
        `curl -X POST "${activeEndpoint}" ` +
        `-H "Content-Type: application/json" ` +
        `-d '${escapedBody}'`
      );
    }

    async function copyTextToClipboard(text, successMessage) {
      const status = document.getElementById("status");
      try {
        if (navigator.clipboard && navigator.clipboard.writeText) {
          await navigator.clipboard.writeText(text);
        } else {
          const t = document.createElement("textarea");
          t.value = text;
          document.body.appendChild(t);
          t.select();
          document.execCommand("copy");
          t.remove();
        }
        status.textContent = successMessage;
      } catch (err) {
        status.textContent = "Copy failed.";
      }
    }

    document.getElementById("importCurlBtn").addEventListener("click", () => {
      const curl = buildCurlSnippet();
      const rawRequest = document.getElementById("rawRequest");
      rawRequest.textContent = curl;
      copyTextToClipboard(curl, "cURL copied. Paste in Postman import.");
    });

    document.getElementById("copyResponseBtn").addEventListener("click", () => {
      const rawResponse = document.getElementById("rawResponse").textContent;
      copyTextToClipboard(rawResponse, "Response copied.");
    });

    document.getElementById("hitBtnCsv").addEventListener("click", () => hitApi("csv"));
    document.getElementById("hitBtnEia").addEventListener("click", () => hitApi("eia"));

    setupThemedDropdown("start", "startSuggestions");
    setupThemedDropdown("finish", "finishSuggestions");
  </script>
</body>
</html>
