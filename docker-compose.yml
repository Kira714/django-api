version: "3.9"

# ── Local development stack ───────────────────────────────────────────────────
# Runs Django + PostgreSQL together.
#
#   docker compose up          # start everything
#   docker compose down -v     # stop and wipe the database volume
#
# For Render / single-container deploys the Dockerfile is used directly —
# PostgreSQL is not required there because SQLite is the default when DB_HOST
# is not set, and fuel stations reload from stations.json on every boot.

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-fuel_route_planner}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    restart: unless-stopped
    command: ./start.sh
    ports:
      - "8765:8765"
    environment:
      PORT: 8765
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-django-insecure-change-me-in-production}
      DEBUG: ${DEBUG:-True}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1}
      # Wire Django to the db service above
      DB_HOST: db
      DB_NAME: ${DB_NAME:-fuel_route_planner}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_PORT: 5432
      GRAPHHOPPER_API_KEY: ${GRAPHHOPPER_API_KEY:-}
      EIA_API_KEY: ${EIA_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8765/admin/login/', timeout=5)\"",
        ]
      interval: 15s
      timeout: 7s
      retries: 5

volumes:
  postgres_data:
